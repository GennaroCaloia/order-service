spring:
  datasource:
    # Testcontainers sovrascrive questo URL a runtime via @DynamicPropertySource.
    # Il valore qui è un placeholder per evitare errori di startup
    # prima che il container sia pronto.
    url: jdbc:tc:postgresql:16:///orderdb
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/versioned
      - classpath:db/migration/seed

app:
  security:
    jwt:
      secret: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBvcmRlciBzZXJ2aWNl

logging:
  level:
    root: WARN
    com.example.orderservice: INFO
    org.flywaydb: INFO