spring:
  application:
    name: order-service

  # JPA base config — il datasource viene sovrascritto per profilo
  jpa:
    open-in-view: false          # mai true in un microservizio
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        generate_statistics: false

  # Flyway base
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

# Actuator
management:
  tracing:
    sampling:
      probability: 1.0    # 100% in dev/local — ridurre a 0.1 in prod
    zipkin:
      tracing:
        endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  metrics:
    tags:
      # Tag comune a tutte le metriche — utile per filtrare in Grafana
      application: ${spring.application.name}
      environment: ${spring.profiles.active:local}
    distribution:
      # Abilita istogrammi per calcolare percentili lato server
      percentiles-histogram:
        http.server.requests: true
        order.processing.time: true
      percentiles:
        http.server.requests: [ 0.5, 0.90, 0.95, 0.99 ]
        order.processing.time: [ 0.5, 0.90, 0.95, 0.99 ]
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
    info:
      enabled: true
  info:
    env:
      enabled: true
    git:
      mode: full

info:
  app:
    name: ${spring.application.name}
    version: @project.version@
    security:
      jwt:
        # Chiave in Base64 — in prod iniettata da vault/secret manager
        secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBvcmRlciBzZXJ2aWNl}
        # Nome del claim che contiene il customerId
        customer-id-claim: sub
        # Nome del claim che contiene i ruoli
        roles-claim: roles

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging base (override per profilo)
logging:
  level:
    root: INFO
    com.example.orderservice: DEBUG
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF